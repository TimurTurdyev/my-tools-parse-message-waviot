<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 260" role="img" aria-label="Parse API Messages">
  <title>Parse API Messages — IoT устройства шлют данные в API, персональный инструмент забирает и парсит</title>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>

    <!-- Пути потоков данных -->
    <!-- Устройства -> API -->
    <path id="up1" d="M 76 70 Q 220 30 440 100"/>
    <path id="up2" d="M 184 96 Q 290 50 440 110"/>
    <path id="up3" d="M 276 70 Q 340 50 440 105"/>
    <!-- API -> приложение (fetch/pull) -->
    <path id="down1" d="M 560 110 Q 640 90 780 130"/>
    <path id="down2" d="M 560 130 Q 660 130 780 150"/>
  </defs>

  <!-- Фон -->
  <rect width="960" height="260" rx="32" fill="url(#bg)"/>
  <rect x="6" y="6" width="948" height="248" rx="26" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>

  <!-- Пунктирная «земля» под устройствами -->
  <line x1="16" y1="220" x2="340" y2="220" stroke="rgba(255,255,255,0.35)" stroke-width="2" stroke-dasharray="5 7"/>

  <!-- ============================================================
       Источники: вышка 1, IoT meter, вышка 2
       ============================================================ -->
  <g stroke="#ffffff" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- === Вышка 1 === -->
    <g stroke-width="4">
      <!-- Ноги каркаса -->
      <line x1="36" y1="220" x2="76" y2="80"/>
      <line x1="116" y1="220" x2="76" y2="80"/>
      <!-- Горизонтальные траверсы -->
      <line x1="46" y1="195" x2="106" y2="195"/>
      <line x1="52" y1="165" x2="100" y2="165"/>
      <line x1="57" y1="135" x2="95" y2="135"/>
      <line x1="62" y1="108" x2="90" y2="108"/>
      <!-- Диагонали каркаса -->
      <line x1="46" y1="195" x2="100" y2="165"/>
      <line x1="106" y1="195" x2="52" y2="165"/>
      <line x1="52" y1="165" x2="95" y2="135"/>
      <line x1="100" y1="165" x2="57" y2="135"/>
      <!-- Антенна -->
      <line x1="76" y1="80" x2="76" y2="62"/>
      <circle cx="76" cy="60" r="3.5" fill="#ffffff" stroke="none"/>
    </g>

    <!-- Радиоволны от вышки 1 -->
    <g stroke-width="2.5">
      <path d="M 84 52 A 10 10 0 0 1 84 68" opacity="0">
        <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
      </path>
      <path d="M 92 44 A 18 18 0 0 1 92 76" opacity="0">
        <animate attributeName="opacity" values="0;0.8;0" dur="2s" begin="0.4s" repeatCount="indefinite"/>
      </path>
      <path d="M 100 36 A 26 26 0 0 1 100 84" opacity="0">
        <animate attributeName="opacity" values="0;0.5;0" dur="2s" begin="0.8s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- === IoT Meter === -->
    <g stroke-width="4">
      <rect x="154" y="130" width="60" height="80" rx="7"/>
      <rect x="162" y="140" width="44" height="18" rx="3" fill="rgba(255,255,255,0.25)"/>
      <circle cx="168" cy="182" r="2.5" fill="#ffffff" stroke="none"/>
      <circle cx="184" cy="182" r="2.5" fill="#ffffff" stroke="none"/>
      <circle cx="200" cy="182" r="2.5" fill="#ffffff" stroke="none"/>
      <!-- Провод питания -->
      <path d="M 214 200 Q 222 200 222 210 L 222 220" stroke-width="3"/>
      <!-- Антенна -->
      <line x1="184" y1="130" x2="184" y2="106"/>
      <circle cx="184" cy="104" r="3.5" fill="#ffffff" stroke="none"/>
    </g>

    <!-- Цифры на экране счётчика — мигают как LCD -->
    <g stroke-width="2.5" stroke="#ffffff">
      <line x1="168" y1="149" x2="175" y2="149">
        <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/>
      </line>
      <line x1="179" y1="149" x2="186" y2="149">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" repeatCount="indefinite"/>
      </line>
      <line x1="190" y1="149" x2="197" y2="149">
        <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" begin="0.3s" repeatCount="indefinite"/>
      </line>
    </g>

    <!-- Радиоволны от meter -->
    <g stroke-width="2.5" fill="none" stroke-linecap="round">
      <path d="M 192 96 A 10 10 0 0 1 192 112" opacity="0">
        <animate attributeName="opacity" values="0;1;0" dur="2s" begin="0.2s" repeatCount="indefinite"/>
      </path>
      <path d="M 200 88 A 18 18 0 0 1 200 120" opacity="0">
        <animate attributeName="opacity" values="0;0.8;0" dur="2s" begin="0.6s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- === Вышка 2 === -->
    <g stroke-width="4">
      <line x1="236" y1="220" x2="276" y2="80"/>
      <line x1="316" y1="220" x2="276" y2="80"/>
      <line x1="246" y1="195" x2="306" y2="195"/>
      <line x1="252" y1="165" x2="300" y2="165"/>
      <line x1="257" y1="135" x2="295" y2="135"/>
      <line x1="262" y1="108" x2="290" y2="108"/>
      <line x1="246" y1="195" x2="300" y2="165"/>
      <line x1="306" y1="195" x2="252" y2="165"/>
      <line x1="252" y1="165" x2="295" y2="135"/>
      <line x1="300" y1="165" x2="257" y2="135"/>
      <line x1="276" y1="80" x2="276" y2="62"/>
      <circle cx="276" cy="60" r="3.5" fill="#ffffff" stroke="none"/>
    </g>

    <!-- Радиоволны от вышки 2 -->
    <g stroke-width="2.5" fill="none" stroke-linecap="round">
      <path d="M 284 52 A 10 10 0 0 1 284 68" opacity="0">
        <animate attributeName="opacity" values="0;1;0" dur="2s" begin="0.3s" repeatCount="indefinite"/>
      </path>
      <path d="M 292 44 A 18 18 0 0 1 292 76" opacity="0">
        <animate attributeName="opacity" values="0;0.8;0" dur="2s" begin="0.7s" repeatCount="indefinite"/>
      </path>
      <path d="M 300 36 A 26 26 0 0 1 300 84" opacity="0">
        <animate attributeName="opacity" values="0;0.5;0" dur="2s" begin="1.1s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>

  <!-- ============================================================
       Центр: API — стек серверов (database cylinders)
       ============================================================ -->
  <g stroke="#ffffff" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Три стэка цилиндров -->
    <g stroke-width="4">
      <!-- Cylinder 1 -->
      <ellipse cx="500" cy="78" rx="60" ry="12"/>
      <line x1="440" y1="78" x2="440" y2="108"/>
      <line x1="560" y1="78" x2="560" y2="108"/>
      <path d="M 440 108 A 60 12 0 0 0 560 108"/>

      <!-- Cylinder 2 -->
      <ellipse cx="500" cy="118" rx="60" ry="12"/>
      <line x1="440" y1="118" x2="440" y2="148"/>
      <line x1="560" y1="118" x2="560" y2="148"/>
      <path d="M 440 148 A 60 12 0 0 0 560 148"/>

      <!-- Cylinder 3 -->
      <ellipse cx="500" cy="158" rx="60" ry="12"/>
      <line x1="440" y1="158" x2="440" y2="188"/>
      <line x1="560" y1="158" x2="560" y2="188"/>
      <path d="M 440 188 A 60 12 0 0 0 560 188"/>
    </g>

    <!-- «Активность» на каждом цилиндре — мигающая зелёная точка -->
    <g stroke="none">
      <circle cx="550" cy="78" r="3.5" fill="#4ade80">
        <animate attributeName="opacity" values="1;0.3;1" dur="1.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="550" cy="118" r="3.5" fill="#4ade80">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="550" cy="158" r="3.5" fill="#4ade80">
        <animate attributeName="opacity" values="1;0.3;1" dur="1.4s" begin="0.5s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Подпись API -->
    <text x="500" y="220" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#ffffff" stroke="none" letter-spacing="3">API</text>
  </g>

  <!-- ============================================================
       Потоки данных от устройств к API (upload)
       ============================================================ -->
  <g fill="#ffffff">
    <circle r="4">
      <animateMotion dur="3.2s" repeatCount="indefinite">
        <mpath href="#up1"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle r="4">
      <animateMotion dur="3.2s" begin="1s" repeatCount="indefinite">
        <mpath href="#up1"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="3.2s" begin="1s" repeatCount="indefinite"/>
    </circle>

    <circle r="4">
      <animateMotion dur="3.2s" begin="0.5s" repeatCount="indefinite">
        <mpath href="#up2"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="3.2s" begin="0.5s" repeatCount="indefinite"/>
    </circle>

    <circle r="4">
      <animateMotion dur="3.2s" begin="1.5s" repeatCount="indefinite">
        <mpath href="#up3"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="3.2s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ============================================================
       Потоки данных от API к приложению (fetch/pull)
       ============================================================ -->
  <g fill="#4ade80">
    <circle r="4">
      <animateMotion dur="2.6s" begin="1.6s" repeatCount="indefinite">
        <mpath href="#down1"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2.6s" begin="1.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="4">
      <animateMotion dur="2.6s" begin="0.4s" repeatCount="indefinite">
        <mpath href="#down2"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2.6s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    <circle r="4">
      <animateMotion dur="2.6s" begin="2s" repeatCount="indefinite">
        <mpath href="#down1"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2.6s" begin="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ============================================================
       Справа: ноутбук с приложением
       ============================================================ -->
  <g stroke="#ffffff" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- Экран ноутбука -->
    <rect x="640" y="50" width="280" height="160" rx="10" stroke-width="4"/>

    <!-- Подставка / база ноутбука -->
    <path d="M 620 218 L 940 218 L 926 232 L 634 232 Z" stroke-width="4"/>
    <!-- Вырез клавиатуры -->
    <line x1="760" y1="225" x2="800" y2="225" stroke-width="3"/>

    <!-- Заголовок окна приложения -->
    <rect x="650" y="60" width="260" height="22" rx="4" fill="rgba(255,255,255,0.22)"/>
    <circle cx="660" cy="71" r="3" fill="#ffffff" stroke="none"/>
    <circle cx="672" cy="71" r="3" fill="#ffffff" stroke="none"/>
    <circle cx="684" cy="71" r="3" fill="#ffffff" stroke="none"/>

    <!-- JWT индикатор -->
    <circle cx="896" cy="71" r="4" fill="#4ade80" stroke="none">
      <animate attributeName="opacity" values="1;0.35;1" dur="1.4s" repeatCount="indefinite"/>
    </circle>

    <!-- Карточки парсинга внутри экрана -->
    <!-- Card 1 -->
    <g stroke-width="2.5">
      <rect x="658" y="96" width="120" height="100" rx="6"/>
      <line x1="668" y1="112" x2="728" y2="112" stroke-width="3"/>
      <g stroke-width="4" stroke-linecap="round">
        <line x1="668" y1="134" x2="750" y2="134" opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.1;0.25;0.9;1" dur="3.2s" repeatCount="indefinite"/>
        </line>
        <line x1="668" y1="152" x2="740" y2="152" opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.1;0.25;0.9;1" dur="3.2s" begin="0.5s" repeatCount="indefinite"/>
        </line>
        <line x1="668" y1="170" x2="754" y2="170" opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.1;0.25;0.9;1" dur="3.2s" begin="1s" repeatCount="indefinite"/>
        </line>
      </g>
    </g>

    <!-- Card 2 -->
    <g stroke-width="2.5">
      <rect x="786" y="96" width="120" height="100" rx="6"/>
      <line x1="796" y1="112" x2="856" y2="112" stroke-width="3"/>
      <g stroke-width="4" stroke-linecap="round">
        <line x1="796" y1="134" x2="878" y2="134" opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.1;0.25;0.9;1" dur="3.2s" begin="0.3s" repeatCount="indefinite"/>
        </line>
        <line x1="796" y1="152" x2="866" y2="152" opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.1;0.25;0.9;1" dur="3.2s" begin="0.8s" repeatCount="indefinite"/>
        </line>
        <line x1="796" y1="170" x2="888" y2="170" opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.1;0.25;0.9;1" dur="3.2s" begin="1.3s" repeatCount="indefinite"/>
        </line>
      </g>
    </g>
  </g>
</svg>
