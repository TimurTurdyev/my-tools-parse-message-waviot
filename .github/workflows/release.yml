name: release

# Триггерится:
#  - push тега вида v* — создаёт GitHub Release и заливает zip-архивы
#  - workflow_dispatch — ручной запуск без релиза (артефакты видны в Actions UI)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # нужно для softprops/action-gh-release

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: darwin-universal
            wails_platform: darwin/universal
            app_name: parse-api-messages.app
            ext: app
          - os: windows-latest
            label: windows-amd64
            wails_platform: windows/amd64
            app_name: parse-api-messages.exe
            ext: exe

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install frontend deps
        shell: bash
        run: cd frontend && npm ci

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build (${{ matrix.wails_platform }})
        shell: bash
        run: wails build -clean -platform ${{ matrix.wails_platform }}

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          cd build/bin
          zip -rq "parse-api-messages-${{ steps.version.outputs.value }}-${{ matrix.label }}.zip" parse-api-messages.app
          mv "parse-api-messages-${{ steps.version.outputs.value }}-${{ matrix.label }}.zip" "$GITHUB_WORKSPACE/"

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Set-Location build/bin
          $zipName = "parse-api-messages-${{ steps.version.outputs.value }}-${{ matrix.label }}.zip"
          Compress-Archive -Path parse-api-messages.exe -DestinationPath $zipName -Force
          Move-Item $zipName $env:GITHUB_WORKSPACE/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: parse-api-messages-${{ steps.version.outputs.value }}-${{ matrix.label }}
          path: parse-api-messages-${{ steps.version.outputs.value }}-${{ matrix.label }}.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
